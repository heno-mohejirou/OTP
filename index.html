<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- CSS読み込み -->
    <link rel="stylesheet" href="term.css">
    <!-- <link rel="stylesheet" href="../static/term.css"> -->

    <link rel="icon" href="data:,">

    <title>Moodle学習支援センター - 利用規約 -</title>
</head>

<body>
    <header>
        <a class="logo" href="/">Moodle学習支援センター</a>
        <div class="row">
            <a href="/term" class="menu">利用規約</a>
            <a href="/use" class="menu">使い方</a>
            <a href="/policy" class="menu">プライバシーポリシー</a>
            <a href="/help" class="menu">ヘルプ</a>
        </div>
    </header>

    <main>
        <div class="content wide-layout">
            <h1 style="text-align: center; margin-bottom: 24px; color: var(--text-main);">英単語一覧</h1>
            <div>
                <div class="table-wrapper wide-table">
                    <table class="word-table">
                        <thead>
                            <tr>
                                <th>English</th>
                                <th>日本語</th>
                                <th>英語の例文</th>
                            </tr>
                        </thead>
                        <tbody id="wordTableBody">
                        </tbody>
                    </table>
                </div>
                <p id="status" class="note">読み込み中...</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="row">
            <a href="/term" class="menu">利用規約</a>
            <a href="/use" class="menu">使い方</a>
            <a href="/policy" class="menu">プライバシーポリシー</a>
            <a href="/help" class="menu">ヘルプ</a>
            <p>(C) Elecitell 2026 ver2.0</p>
        </div>
    </footer>

    <script>
        async function loadWordList() {
            const status = document.getElementById('status');
            const tbody = document.getElementById('wordTableBody');
            try {
                const response = await fetch(new URL('./words.json', location.href));
                if (!response.ok) throw new Error('読み込みに失敗しました');
                const words = await response.json();

                if (!Array.isArray(words) || words.length === 0) {
                    status.textContent = '単語データがありません。';
                    return;
                }

                words.forEach(item => {
                    const row = document.createElement('tr');
                    const wordCell = document.createElement('td');
                    const meaningCell = document.createElement('td');
                    const exampleCell = document.createElement('td');
                    const revealBtn = document.createElement('button');
                    const answerText = document.createElement('span');

                    wordCell.textContent = item.word || '';

                    revealBtn.className = 'reveal-btn';
                    revealBtn.type = 'button';
                    revealBtn.textContent = '答えを見る';

                    answerText.className = 'hidden-answer';
                    answerText.textContent = item.meaning || 'なし';

                    revealBtn.addEventListener('click', () => {
                        const isHidden = answerText.classList.contains('hidden-answer');
                        if (isHidden) {
                            answerText.classList.remove('hidden-answer');
                            answerText.classList.add('visible-answer');
                            revealBtn.textContent = '隠す';
                        } else {
                            answerText.classList.remove('visible-answer');
                            answerText.classList.add('hidden-answer');
                            revealBtn.textContent = '答えを見る';
                        }
                    });

                    meaningCell.appendChild(revealBtn);
                    meaningCell.appendChild(answerText);
                    exampleCell.textContent = item.example || '';

                    row.appendChild(wordCell);
                    row.appendChild(meaningCell);
                    row.appendChild(exampleCell);
                    tbody.appendChild(row);
                });

                status.textContent = `全 ${words.length} 件を表示しました。`;
            } catch (error) {
                status.textContent = 'データの読み込み中にエラーが発生しました。ローカルファイルはサーバー経由で開く必要があります。';
                console.error(error);
            }
        }

        window.addEventListener('DOMContentLoaded', loadWordList);
    </script>
</body>

</html>
